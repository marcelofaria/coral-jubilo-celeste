name: Generate repertório JSON

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-por

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Generate repertorio.json
        run: node ./scripts/generate-repertorio-json.js

      - name: Show generated JSON files
        run: |
          echo 'JSON folder listing:'
          ls -la json || true
          echo 'repertorio.json preview:'
          head -n 40 json/repertorio.json || true
          echo 'repertorio_ocr.json preview:'
          head -n 40 json/repertorio_ocr.json || true

      - name: Upload generated JSONs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: repertorio-jsons
          path: json/

      - name: Commit generated JSON if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ensure authenticated origin for fetch/pull/push
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add json/repertorio.json json/repertorio_ocr.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: atualizar json/repertorio.json e json/repertorio_ocr.json (automático)"
            # Update remote and rebase local commit onto latest remote to avoid non-fast-forward errors.
            # Use --autostash to handle any unstaged/local changes created during CI steps.
            git fetch origin ${{ github.ref_name }} || git fetch origin
            git pull --rebase --autostash origin ${{ github.ref_name }} || { echo "Pull --rebase failed, aborting"; exit 1; }
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
