<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Visualizador de Hino</title>
    <style>
      body{margin:0;height:100vh;background:#071126;color:#fff;font-family:Nunito,system-ui,sans-serif}
      iframe{border:0;width:100%;height:100vh}
      .floating-back{position:fixed;left:14px;top:14px;z-index:60;display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:10px;background:linear-gradient(180deg,#ffd166,#ffb347);color:#082032;text-decoration:none;font-weight:800;box-shadow:0 8px 24px rgba(2,6,23,0.6)}
      .title{position:fixed;left:70px;top:20px;z-index:55;color:#ffd166;font-weight:700;background:transparent;padding:6px 10px;border-radius:8px}
      @media (max-width:520px){.title{left:62px;top:16px;font-size:13px}}
    </style>
  </head>
  <body>
    <iframe id="pdfFrame" src="about:blank"></iframe>
    <script>
      const params = new URLSearchParams(location.search);
      const file = params.get('file');
      const frame = document.getElementById('pdfFrame');
      if(!file){ frame.src='about:blank' }
      else{
        // PDF served from the repository under /repertorio/<file>
        frame.src = `../repertorio/${file}`;
      }
    </script>
  </body>
</html>
